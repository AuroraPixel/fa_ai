version: '3'

services:
  fal-ai-web-ui:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - FAL_KEYS=${FAL_KEYS}
      - MINIO_ENDPOINT=s3.cortexai.info
      - MINIO_PORT=443
      - MINIO_USE_SSL=true
      - MINIO_ACCESS_KEY=minio
      - MINIO_SECRET_KEY=rL4svPKZ7T1N6RI9jEzU23nqi0mu5X8M
      - MINIO_BUCKET=txtxtxtxt1
    volumes:
      # 只保留元数据文件夹挂载
      - ./docker-data/metadata:/app/public/metadata
    restart: unless-stopped
    # 添加健康检查
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  fal_outputs:
    # 保存生成的图片
  fal_metadata:
    # 保存图片元数据 